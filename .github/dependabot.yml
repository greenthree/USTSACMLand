version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '03:00'
      timezone: Asia/Shanghai
    open-pull-requests-limit: 5
    rebase-strategy: auto
    groups:
      npm-minor-and-patch:
        patterns:
          - '*'
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '03:30'
      timezone: Asia/Shanghai
    open-pull-requests-limit: 5
    rebase-strategy: auto
    groups:
      actions-minor-and-patch:
        patterns:
          - '*'
        update-types:
          - minor
          - patch
