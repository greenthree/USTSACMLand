project_id = "usts-acm-land"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[local_smtp]
enabled = true
port = 54324

[auth]
enabled = true
site_url = "https://ustsacm.fun/"
additional_redirect_urls = ["http://localhost:5173/**", "http://127.0.0.1:5173/**", "http://127.0.0.1:5174/**", "https://ustsacm.fun/**", "https://greenthree.github.io/USTSACMLand/**"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true

[auth.rate_limit]
# Campus networks may share one public IP; keep the local baseline explicit and
# verify the hosted limits separately before enabling registration protection.
sign_in_sign_ups = 30
token_verifications = 30

[auth.captcha]
# Production is configured in Supabase Auth. Local CAPTCHA remains disabled so
# the development stack does not require a committed Turnstile secret.
enabled = false
provider = "turnstile"
secret = ""

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false
secure_password_change = true
max_frequency = "1m"
otp_length = 8
otp_expiry = 3600

[auth.mfa]
max_enrolled_factors = 10

[auth.mfa.totp]
enroll_enabled = true
verify_enabled = true

[auth.mfa.phone]
enroll_enabled = false
verify_enabled = false

[storage]
enabled = true
file_size_limit = "50MiB"

[storage.vector]
enabled = false
max_buckets = 10
max_indexes = 5

[functions.sync-member]
verify_jwt = true

[functions.sync-stats]
verify_jwt = true

[functions.delete-account]
verify_jwt = true

[functions.change-password]
verify_jwt = true

[functions.webchat]
verify_jwt = true

[functions.webchat-attachment]
verify_jwt = true

[functions.webchat-image-cleanup]
verify_jwt = true

[functions.webchat-config]
verify_jwt = true

[functions.webchat-cache-probe]
verify_jwt = true

[functions.firecrawl-config]
verify_jwt = true
